{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 2rem auto;">
    <div class="card-header">
        <h2>Create Placement Drive</h2>
    </div>

    <form method="POST">
        <div class="form-group">
            <label for="job_title">Job Title:</label>
            <input type="text" name="job_title" id="job_title" required>
        </div>

        <div class="form-group">
            <label for="job_description">Job Description:</label>
            <textarea name="job_description" id="job_description" rows="5" required></textarea>
        </div>

        <div class="form-group">
            <label for="eligibility_criteria">Eligibility Criteria:</label>
            <textarea name="eligibility_criteria" id="eligibility_criteria" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label for="required_cgpa">Required CGPA:</label>
            <input type="number" step="0.01" name="required_cgpa" id="required_cgpa" min="0" max="10" required>
        </div>

        <div class="form-group">
            <label for="salary_package">Salary Package (e.g., 10-12 LPA):</label>
            <input type="text" name="salary_package" id="salary_package">
        </div>

        <div class="form-group">
            <label for="application_deadline">Application Deadline:</label>
            <input type="date" name="application_deadline" id="application_deadline" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Drive</button>
    </form>
</div>
{% endblock %}
