{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 3rem auto;">
    <div class="card-header">
        <h2>Login</h2>
    </div>
    <form method="post">
        <div class="form-group">
            <label for="role">Login as:</label>
            <select name="role" id="role" required>
                <option value="">Selete Role</option>
                <option value="admin">Admin</option>
                <option value="company">Company</option>
                <option value="student">Student</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" required>
        </div>

        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" name="password" id="password" required>
        </div>
        <br>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
    </form>

    <p style="margin-top: 1.5rem; text-align: ceenter;">
        Don't have an account?
        <a href="{{ url_for('register_student') }}">Register as Student</a>
        <a href="{{ url_for('register_company') }}">Register as Company</a>
    </p>

    <p style="margin-top: 1rem; text-align: center; color:#888; font-size: 0.9rem;">
        <!-- Default Admin: admin@iitm.ac.in / admin123 -->
    </p>
</div>
{% endblock %}
