{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 2rem auto;">
    <div class="card-header">
        <h2>Company Registration</h2>
    </div>

    <form method="POST">
        <div class="form-group">
            <label for="company_name">Company Name:</label>
            <input type="text" name="company_name" id="company_name" required>
        </div>

        <div class="form-group">
            <label for="email">Company Email:</label>
            <input type="email" name="email" id="email" required>
        </div>

        <div class="form-group">
            <label for="hr_name">HR Contact Name:</label>
            <input type="text" name="hr_name" id="hr_name" required>
        </div>

        <div class="form-group">
            <label for="hr_contact">HR Contact Number:</label>
            <input type="tel" name="hr_contact" id="hr_contact" required>
        </div>

        <div class="form-group">
            <label for="website">Company Website:</label>
            <input type="url" name="website" id="website">
        </div>

        <div class="form-group">
            <label for="description">Company Description:</label>
            <textarea name="description" id="description" rows="4"></textarea>
        </div>

        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" name="password" id="password" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
    </form>

    <p style="margin-top: 1.5rem; text-align: center; color: #888;">
        Note: Your account will be activated after admin approval.
    </p>

    <p style="margin-top: 0.5rem; text-align: center;">
        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </p>
</div>
{% endblock %}
