{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 2rem auto;">
    <div class="card-header">
        <h2>Student Registration</h2>
    </div>

    <form method="POST">
        <div class="form-group">
            <label for="roll_number">Roll Number:</label>
            <input type="text" name="roll_number" id="roll_number" required>
        </div>

        <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" name="name" id="name" required>
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone:</label>
            <input type="tel" name="phone" id="phone">
        </div>

        <div class="form-group">
            <label for="department">Department:</label>
            <select name="department" id="department" required>
                <option value="">Select Department</option>
                <option value="Data Science and Applications">Data Science and Applications</option>
                <option value="Eletronics systems">Eletronics systems</option>
                <option value="Biotechnology">Biotechnology</option>
            </select>
        </div>

        <div class="form-group">
            <label for="cgpa">CGPA:</label>
            <input type="number" step="0.01" name="cgpa" id="cgpa" min="0" max="10" required>
        </div>

        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" name="password" id="password" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
    </form>

    <p style="margin-top: 1.5rem; text-align: center;">
        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </p>
</div>
{% endblock %}
