{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 700px; margin: 2rem auto;">
    <div class="card-header">
        <h2>My Profile</h2>
    </div>

    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="roll_number">Roll Number:</label>
            <input type="text" name="roll_number" id="roll_number" value="{{ student.roll_number }}" disabled>
            <small style="color: #888;">Roll number cannot be changed</small>
        </div>

        <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" name="name" id="name" value="{{ student.name }}" required>
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" value="{{ student.email }}" disabled>
            <small style="color: #888;">Email cannot be changed</small>
        </div>

        <div class="form-group">
            <label for="phone">Phone:</label>
            <input type="tel" name="phone" id="phone" value="{{ student.phone or '' }}">
        </div>

        <div class="form-group">
            <label for="department">Department:</label>
            <input type="text" name="department" id="department" value="{{ student.department }}" required>
        </div>

        <div class="form-group">
            <label for="cgpa">CGPA:</label>
            <input type="number" step="0.01" name="cgpa" id="cgpa" value="{{ student.cgpa }}" min="0" max="10" required>
        </div>

        <div class="form-group">
            <label for="resume">Upload Resume (PDF/DOC/DOCX):</label>
            <input type="file" name="resume" id="resume" accept=".pdf,.doc,.docx">
            {% if student.resume_path %}
            <small style="color: #27ae60;">
                ✓ Resume uploaded |
                <a href="{{ url_for('download_resume', student_id=student.id) }}" target="_blank"
                    style="color: #3498db; text-decoration: underline;">
                    View Current Resume
                </a>
            </small>
            {% else %}
            <small style="color: #e74c3c;">No resume uploaded yet</small>
            {% endif %}
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Update Profile</button>
    </form>
</div>
{% endblock %}
